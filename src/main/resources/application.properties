spring.application.name=BotBuy

spring.main.allow-bean-definition-overriding=true

logging.level.dev.langchain4j=INFO
logging.level.dev.ai4j.openai4j=INFO

chat.open-ai.base-url-proxy=${OPENAI_BASE_URL:https://api.openai.com/v1}
chat.open-ai.model.name=${OPENAI_CHAT_MODEL:gpt-4o-mini}
chat.open-ai.reasoning.model.name=${OPENAI_REASONING_MODEL:o1-mini}
chat.open-ai.api-key=${OPENAI_API_KEY:your-api-key}

chat.memory.message.max-length=20

embedding.open-ai.model.name=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
embedding.dash-vector.endpoint=${DASHVECTOR_ENDPOINT:}
embedding.dash-vector.api-key=${DASHVECTOR_API_KEY:}
embedding.dash-vector.collection-name=${DASHVECTOR_COLLECTION:default}
embedding.dash-vector.query.max-results=3
embedding.dash-vector.query.max-score=0.55
embedding.dash-vector.client.request-timeout=10

log.chat-model.request.enable=false
log.chat-model.response.enable=false
log.embedding.request.enable=false
log.embedding.response.enable=false

spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DB:0}

botbuy.prompt.llm-img-recognize=Summarize the user image in a short English query suitable for knowledge-base search.
botbuy.prompt.rag-stream-ai-service=
botbuy.prompt.rag-ai-service=
